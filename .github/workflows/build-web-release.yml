name: Build Web ZIP and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: greek_connect
        run: flutter pub get

      - name: Analyze
        working-directory: greek_connect
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: greek_connect
        run: flutter test

      - name: Build web release
        working-directory: greek_connect
        run: flutter build web --release

      - name: Create ZIP
        working-directory: greek_connect
        run: python -c "import shutil; shutil.make_archive('greek_connect-web', 'zip', 'build/web')"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: greek_connect-web
          path: greek_connect/greek_connect-web.zip

      - name: Upload ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: greek_connect/greek_connect-web.zip
          generate_release_notes: true