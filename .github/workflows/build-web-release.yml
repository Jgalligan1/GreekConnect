name: Build Web ZIP and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: greek_connect
        run: flutter pub get

      - name: Analyze
        working-directory: greek_connect
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        working-directory: greek_connect
        run: flutter test

      - name: Build web release
        working-directory: greek_connect
        run: flutter build web --release

      - name: Create ZIP
        working-directory: greek_connect
        run: python -c "import shutil; shutil.make_archive('greek_connect-web', 'zip', 'build/web')"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: greek_connect-web
          path: greek_connect/greek_connect-web.zip

      - name: Update README with Version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COMMIT_HASH=${{ github.sha }}
          SHORT_HASH=${COMMIT_HASH:0:7}
          README_PATH="README.md"

          # Extract the base version (major.minor) from the current Version line
          # Format: "Version: X.Y.HASH" -> extract "X.Y"
          if grep -q "^Version:" "$README_PATH"; then
            BASE_VERSION=$(grep "^Version:" "$README_PATH" | sed 's/^Version: //' | cut -d. -f1-2)
          else
            BASE_VERSION="0.1"
          fi

          # Create new version string with base version + short commit hash (first 7 chars)
          NEW_VERSION="$BASE_VERSION.$SHORT_HASH"

          # Update the Version field
          if grep -q "^Version:" "$README_PATH"; then
            sed -i "s/^Version:.*/Version: $NEW_VERSION/" "$README_PATH"
          else
            sed -i "1i Version: $NEW_VERSION\n" "$README_PATH"
          fi

          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Commit and push
          git add "$README_PATH"
          if [[ $(git status --porcelain) ]]; then
            git commit -m "chore: update README version to $NEW_VERSION"
            git push
          fi

      - name: Upload ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: greek_connect/greek_connect-web.zip
          generate_release_notes: true
